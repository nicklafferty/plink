name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Plink.app
        run: ./build.sh

      - name: Zip app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Plink.app" "Plink.zip"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: Plink.zip
          generate_release_notes: true
