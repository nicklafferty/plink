  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {

      }
      return map;
    }

      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.

            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +

              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.

      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{"pages":{"Plink Website.dc":"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"c9abf814-b216-4aff-a663-622b8d7e27fb\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n@font-face{font-family:\"Inter Variable\";font-weight:100 900;font-style:normal;font-display:swap;src:url(\"6c1cc696-e015-49ed-a850-73cf186b22b8\") format(\"truetype-variations\");}\n*{box-sizing:border-box;}\nhtml{scroll-behavior:smooth;}\nbody{margin:0;font-family:\"Inter Variable\",-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif;font-feature-settings:\"cv01\",\"ss02\",\"ss03\",\"cv05\";-webkit-font-smoothing:antialiased;color:#18181a;background:#ffffff;}\na{text-decoration:none;color:inherit;}\n::selection{background:#18181a;color:#fff;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:100%;overflow-x:hidden;\">\n\n  <!-- ===== NAV ===== -->\n  <nav style=\"position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(255,255,255,.72);backdrop-filter:blur(20px);border-bottom:1px solid #f0f0f0;\">\n    <a href=\"#top\" style=\"display:flex;align-items:center;gap:9px;\">\n      <span style=\"width:26px;height:26px;border-radius:7px;background:#18181a;display:flex;align-items:center;justify-content:center;color:#fff;\">\n        <svg width=\"15\" height=\"15\" viewBox=\"0 0 18 18\"><path fill-rule=\"evenodd\" fill=\"currentColor\" d=\"M9 1.8C9 1.8 14.2 7.6 14.2 11.4A5.2 5.2 0 1 1 3.8 11.4C3.8 7.6 9 1.8 9 1.8Z M7.2 8.3C5.9 9.1 5.3 10.7 5.9 12.1C5.6 10.5 6.2 9.2 7.6 8.6Z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fspan>\n      <span style=\"font:600 16px/20px 'Inter Variable';letter-spacing:-0.3px;\">Plink<\u002Fspan>\n    <\u002Fa>\n    <div style=\"display:flex;align-items:center;gap:26px;\">\n      <a href=\"#how\" style=\"font:500 13px/18px 'Inter Variable';color:#787878;\">How it works<\u002Fa>\n      <a href=\"#features\" style=\"font:500 13px/18px 'Inter Variable';color:#787878;\">Features<\u002Fa>\n      <a href=\"#privacy\" style=\"font:500 13px/18px 'Inter Variable';color:#787878;\">Privacy<\u002Fa>\n      <a href=\"{{ githubUrl }}\" style=\"font:500 13px/18px 'Inter Variable';color:#787878;\">GitHub<\u002Fa>\n      <a href=\"{{ downloadUrl }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:#18181a;color:#fff;font:500 13px/18px 'Inter Variable';padding:8px 15px;border-radius:8px;\" style-hover=\"background:#2c2c2e;\">\n        <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12m0 0l4-4m-4 4l-4-4M5 21h14\"><\u002Fpath><\u002Fsvg>\n        Download\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ===== HERO ===== -->\n  <header id=\"top\" style=\"max-width:1120px;margin:0 auto;padding:80px 32px 40px;text-align:center;\">\n    <div style=\"display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border-radius:9999px;border:1px solid #e8e8e8;background:#fafafa;font:500 12px/16px 'Inter Variable';color:#787878;margin-bottom:26px;\">\n      <span style=\"width:6px;height:6px;border-radius:50%;background:oklch(62.695% 0.18045 148.232);\"><\u002Fspan>\n      macOS menu bar app · free &amp; open source\n    <\u002Fdiv>\n    <h1 style=\"margin:0 auto 20px;max-width:760px;font:600 64px/66px 'Inter Variable';letter-spacing:-2px;text-wrap:balance;\">Drag HEIC in,<br>JPG out.<\u002Fh1>\n    <p style=\"margin:0 auto 32px;max-width:540px;font:400 18px/27px 'Inter Variable';color:#787878;text-wrap:pretty;\">Plink is a tiny macOS menu bar app that turns iPhone HEIC photos into universal JPGs — instantly, privately, right on your Mac. No website, no upload, no wait.<\u002Fp>\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px;\">\n      <a href=\"{{ downloadUrl }}\" style=\"display:in     <!-- floating app icon -->\n      <img src=\"287d1810-4a11-467f-92e5-13684cb6960f\" alt=\"Plink icon\" style=\"position:absolute;left:70px;bottom:48px;width:128px;height:128px;border-radius:28px;box-shadow:0 24px 48px rgba(0,0,0,.28);\">\n      <div style=\"position:absolute;left:70px;bottom:22px;width:128px;text-align:center;font:500 11px/15px 'Inter Variable';color:#6b6d72;\">Plink<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HOW IT WORKS ===== -->\n  <section id=\"how\" style=\"max-width:1120px;margin:0 auto;padding:72px 32px;\">\n    <div style=\"text-align:center;margin-bottom:48px;\">\n      <div style=\"font:600 11px/14px 'Inter Variable';letter-spacing:1.4px;text-transform:uppercase;color:#969696;margin-bottom:10px;\">How it works<\u002Fdiv>\n      <h2 style=\"margin:0;font:600 34px/38px 'Inter Variable';letter-spacing:-0.8px;\">Three steps. No friction.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px;\">\n      <div style=\"border:1px solid #e8e8e8;border-radius:12px;padding:28px;background:#fff;\">\n        <div style=\"width:30px;height:30px;border-radius:8px;background:#18181a;color:#fff;display:flex;align-items:center;justify-content:center;font:600 14px/1 'Inter Variable';margin-bottom:18px;\">1<\u002Fdiv>\n        <h3 style=\"margin:0 0 7px;font:600 17px/22px 'Inter Variable';letter-spacing:-0.3px;\">Click the droplet<\u002Fh3>\n        <p style=\"margin:0;font:400 14px/21px 'Inter Variable';color:#787878;text-wrap:pretty;\">Plink lives in your menu bar — no Dock clutter. Click the droplet to open it.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #e8e8e8;border-radius:12px;padding:28px;background:#fff;\">\n        <div style=\"width:30px;height:30px;border-radius:8px;background:#18181a;color:#fff;display:flex;align-items:center;justify-content:center;font:600 14px/1 'Inter Variable';margin-bottom:18px;\">2<\u002Fdiv>\n        <h3 style=\"margin:0 0 7px;font:  30px 60px -24px rgba(0,0,0,.4);\">\n      <div style=\"position:relative;z-index:2;max-width:560px;\">\n        <div style=\"display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:9999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font:500 12px/16px 'Inter Variable';color:rgba(255,255,255,.7);margin-bottom:22px;\">\n          <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"oklch(80% 0.17 150)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2.5l7 3v5.5c0 4.5-3 8.2-7 9.5-4-1.3-7-5-7-9.5V5.5z\"><\u002Fpath><path d=\"M9 12l2 2 4-4.5\"><\u002Fpath><\u002Fsvg>\n          100% private &amp; offline\n        <\u002Fdiv>\n        <h2 style=\"margin:0 0 16px;font:600 36px/40px 'Inter Variable';letter-spacing:-0.9px;color:#fff;text-wrap:balance;\">Your photos never leave your Mac.<\u002Fh2>\n        <p style=\"margin:0;font:400 16px/24px 'Inter Variable';color:rgba(255,255,255,.6);text-wrap:pretty;\">Unlike web-based converters, Plink does everything locally with Apple's own image frameworks. No internet, no uploads, no accounts, no tracking — just your files, on your machine.<\u002Fp>\n      <\u002Fdiv>\n      <span style=\"position:absolute;right:-40px;bottom:-60px;z-index:1;color:rgba(255,255,255,.05);\">\n        <svg width=\"360\" height=\"360\" viewBox=\"0 0 18 18\"><path fill-rule=\"evenodd\" fill=\"currentColor\" d=\"M9 1.8C9 1.8 14.2 7.6 14.2 11.4A5.2 5.2 0 1 1 3.8 11.4C3.8 7.6 9 1.8 9 1.8Z M7.2 8.3C5.9 9.1 5.3 10.7 5.9 12.1C5.6 10.5 6.2 9.2 7.6 8.6Z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SPECS / CTA ===== -->\n  <section style=\"max-width:1120px;margin:0 auto;padding:0 32px 88px;text-align:center;\">\n    <img src=\"287d1810-4a11-467f-92e5-13684cb6960f\" alt=\"Plink icon\" style=\"width:88px;height:88px;border-radius:20px;box-shadow:0 16px 32px rgba(0,0,0,.18);margin-bottom:24px;\">\n    <h2 style=\"margin:0 0 14px;font:600 30px/34px 'Inter Variable';letter-spacing:-0.6px;\">Get Plink<\u002Fh2>\n    <p style=\"margin:0 auto 28px;max-width:420px;font:400 15px/22px 'Inter Variable';color:#787878;\">Free, open source, and featherweight. Built in Swift with no dependencies.<\u002Fp>\n    <a href=\"{{ downloadUrl }}\" style=\"display:inline-flex;align-items:center;gap:9px;background:#18181a;color:#fff;font:500 15px/20px 'Inter Variable';padding:13px 26px;border-radius:10px;\" style-hover=\"background:#2c2c2e;\">\n      <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M16.365 1.43c0 1.14-.467 2.22-1.22 3.01-.81.85-2.12 1.5-3.21 1.41-.13-1.1.42-2.26 1.14-3 .8-.82 2.2-1.43 3.29-1.43zM20.5 17.06c-.55 1.27-.82 1.84-1.53 2.96-.99 1.57-2.38 3.52-4.11 3.53-1.53.02-1.93-.99-4.01-.98-2.08.01-2.52 1-4.05.97-1.73-.02-3.05-1.78-4.04-3.34C-.05 16.06-.36 10.9 1.34 8.16c.99-1.61 2.55-2.62 4.25-2.62 1.74 0 2.83 1.01 4.27 1.01 1.4 0 2.25-1.01 4.26-1.01 1.52 0 3.13.83 4.28 2.26-3.76 2.06-3.15 7.43.8 9.26z\"><\u002Fpath><\u002Fsvg>\n      Download for macOS\n    <\u002Fa>\n    <div style=\"margin-top:14px;font:400 12px/16px 'Inter Variable';color:#969696;\">macOS 12+ · MIT license · launches at login (optional)<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"border-top:1px solid #f0f0f0;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:26px 32px;display:flex;align-items:center;justify-content:space-between;\">\n      <div style=\"display:flex;align-items:center;gap:8px;\">\n        <span style=\"width:22px;height:22px;border-radius:6px;background:#18181a;display:flex;align-items:center;justify-content:center;color:#fff;\">\n          <svg width=\"13\" height=\"13\" viewBox=\"0 0 18 18\"><path fill-rule=\"evenodd\" fill=\"currentColor\" d=\"M9 1.8C9 1.8 14.2 7.6 14.2 11.4A5.2 5.2 0 1 1 3.8 11.4C3.8 7.6 9 1.8 9 1.8Z M7.2 8.3C5.9 9.1 5.3 10.7 5.9 12.1C5.6 10.5 6.2 9.2 7.6 8.6Z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n        <span style=\"font:600 13px/18px 'Inter Variable';\">Plink<\u002Fspan>\n        <span style=\"font:400 12px/18px 'Inter Variable';color:#969696;margin-left:6px;\">HEIC → JPG, right from your menu bar.<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:22px;font:500 13px/18px 'Inter Variable';color:#787878;\">\n        <a href=\"{{ githubUrl }}\" style-hover=\"color:#18181a;\">GitHub<\u002Fa>\n        <a href=\"{{ githubUrl }}\" style-hover=\"color:#18181a;\">License<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:760},&quot;downloadUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://github.com/nicklafferty/plink/releases/latest/download/Plink.zip&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;githubUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://github.com/nicklafferty/plink&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      downloadUrl: this.props.downloadUrl ?? 'https://github.com/nicklafferty/plink/releases/latest/download/Plink.zip',\n      githubUrl: this.props.githubUrl ?? 'https://github.com/nicklafferty/plink'\n    };\n  }\n  componentDidMount() { this.fillFeatures(); }\n  fillFeatures() {\n    const host = document.querySelector('[data-features]');\n    if (!host) { requestAnimationFrame(() => this.fillFeatures()); return; }\n    if (host.querySelector('[data-fcard]')) return;\n    const ic = (p) => '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#18181a\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">'+p+'<\u002Fsvg>';\n    const feats = [\n      [ic('<path d=\"M15 3.75A2.25 2.25 0 0117.25 6v3.5\"/><path d=\"M12 21l-1.5-4.5L6 15l9-9 ' + '' + '\"/><path d=\"M13.5 6.5L18 11l-2 6.5-2.5-7-7-2.5z\"/>'), 'Drag &amp; drop', 'Drop one file or a whole batch right onto the popover.'],\n      [ic('<rect x=\"4\" y=\"4\" width=\"16\" height=\"16\" rx=\"3\"/><path d=\"M9 4v16M4 9h5\"/>'), 'Finder Quick Action', 'Right-click HEICs in Finder → Quick Actions → Convert, without opening the app.'],\n      [ic('<path d=\"M13 2L4.5 13.5H11l-1 8.5L19.5 10H13z\"/>'), 'Batch + live progress', 'A progress bar and current file name — “Converting… 2 of 3.”'],\n      [ic('<path d=\"M3 7.5A1.5 1.5 0 014.5 6h5l2 2.5h7A1.5 1.5 0 0120 10v8a1.5 1.5 0 01-1.5 1.5h-14A1.5 1.5 0 013 18z\"/><path d=\"M12 11v5m0 0l2-2m-2 2l-2-2\"/>'), 'Saves to your Desktop', 'Lands on your Desktop and never overwrites — duplicates get -2, -3, …'],\n      [ic('<circle cx=\"12\" cy=\"12\" r=\"9\"/><path d=\"M9 12.75l2 2 4-4.5\"/>'), 'High quality', '92% JPEG quality with photo orientation preserved.'],\n      [ic('<rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\"/><path d=\"M8 11V8a4 4 0 018 0v3\"/>'), 'Private &amp; offline', 'All conversion runs locally. No internet, accounts, or tracking.'],\n    ];\n    host.innerHTML = feats.map(([icon, title, body]) =>\n      '<div data-fcard style=\"background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:24px;\">'\n      + '<div style=\"width:40px;height:40px;border-radius:10px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;margin-bottom:16px;\">'+icon+'<\u002Fdiv>'\n      + '<h3 style=\"margin:0 0 6px;font:600 16px/21px \\'Inter Variable\\';letter-spacing:-0.2px;\">'+title+'<\u002Fh3>'\n      + '<p style=\"margin:0;font:400 14px/21px \\'Inter Variable\\';color:#787878;\">'+body+'<\u002Fp>'\n      + '<\u002Fdiv>'\n    ).join('');\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Plink Website.dc"}
